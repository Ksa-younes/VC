name: Sync Loop

on:
  workflow_dispatch:
  schedule:
    - cron: '*/5 * * * *'

jobs:
  build-and-sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Local Repo
        uses: actions/checkout@v4

      - name: Clean Current Directory
        run: |
          find . -maxdepth 1 ! -name '.' ! -name '..' ! -name '.git' ! -name '.github' -exec rm -rf {} +

      - name: Fetch Remote Files
        run: |
          wget -m -p -k -nH --cut-dirs=0 https://vi-ra-caisse-561480809159.europe-west2.run.app
          rm -f robots.txt

      - name: Purge Tracking Elements
        run: |
          if [ -f index.html ]; then
            sed -i '/googletagmanager\.com\/gtag\/js/d' index.html
            sed -i '/window\.dataLayer/,/<\/script>/d' index.html
            sed -i '/gtag(/d' index.html
          fi

      - name: Strip Comments and Minify
        run: |
          if [ -d assets ]; then
            for f in assets/*.js; do
              npx terser "$f" --compress --mangle --comments false -o "$f"
            done
          fi
          if [ -f index.html ]; then
            npx html-minifier --collapse-whitespace --remove-comments --remove-redundant-attributes --remove-script-type-attributes --remove-style-link-type-attributes --minify-css true --minify-js true -o index.html index.html
          fi

      - name: Push to Pipeline
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add .
          git diff --quiet && git diff --staged --quiet || (git commit -m "chore: sync and optimize assets" && git push)
