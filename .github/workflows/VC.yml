name: Ubdate VC

on:
  workflow_dispatch:
  schedule:
    - cron: '*/59 * * * *'

jobs:
  build-and-sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write 
    steps:
      - name: Checkout Local Repo
        uses: actions/checkout@v4

      - name: Clean Current Directory
        run: |
          find . -maxdepth 1 ! -name '.' ! -name '..' ! -name '.git' ! -name '.github' -exec rm -rf {} +

      - name: Fetch Remote Files
        run: |
          mkdir -p assets
          BASE_URL="https://vi-ra-caisse-561480809159.europe-west2.run.app"
          
          curl -H "User-Agent: Mozilla/5.0" -L -o index.html "$BASE_URL/"
          curl -H "User-Agent: Mozilla/5.0" -L -o index.css "$BASE_URL/index.css"
          curl -H "User-Agent: Mozilla/5.0" -L -o assets/index-CUzW0L13.js "$BASE_URL/assets/index-CUzW0L13.js"
          curl -H "User-Agent: Mozilla/5.0" -L -o _websocket-interceptor.js "$BASE_URL/_websocket-interceptor.js?v=1"
          curl -H "User-Agent: Mozilla/5.0" -L -o _service-worker.js "$BASE_URL/_service-worker.js" || true

      - name: Push to Pipeline
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add .
          git commit -m "chore: sync exact assets" || echo "No changes to commit"
          git push
