```yaml
name: Sync Loop

on:
  workflow_dispatch:
  schedule:
    - cron: '*/5 * * * *'

jobs:
  build-and-sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Local Repo
        uses: actions/checkout@v4

      - name: Clean Current Directory
        run: |
          find . -maxdepth 1 ! -name '.' ! -name '..' ! -name '.git' ! -name '.github' -exec rm -rf {} +

      - name: Fetch Remote Files
        run: |
          wget -m -p -E -k -nH --cut-dirs=0 -U "Mozilla/5.0" https://vi-ra-caisse-561480809159.europe-west2.run.app
          rm -f robots.txt

      - name: Flatten Directory Structure
        run: |
          # Move files from the domain folder to root
          if [ -d "vi-ra-caisse-561480809159.europe-west2.run.app" ]; then
            cp -rf vi-ra-caisse-561480809159.europe-west2.run.app/* .
            rm -rf vi-ra-caisse-561480809159.europe-west2.run.app
          fi

      - name: Purge Tracking Elements
        run: |
          if [ -f index.html ]; then
            sed -i '/googletagmanager\.com\/gtag\/js/d' index.html
            sed -i '/window\.dataLayer/,/<\/script>/d' index.html
            sed -i '/gtag(/d' index.html
          fi

      - name: Push to Pipeline
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add .
          git diff --quiet && git diff --staged --quiet || (git commit -m "chore: sync remote assets" && git push)

```
